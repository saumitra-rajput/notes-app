- name: Setup Docker App
  hosts: notesapp
  become: yes

  vars:
    repo_url: "https://github.com/saumitra-rajput/notes-app.git"
    app_dir: "/home/{{ ansible_user }}/app"

  tasks:

    - name: Install Docker, Compose and Git
      apt:
        name:
          - docker.io
          - docker-compose
          - git
        state: present
        update_cache: yes

    - name: Start Docker
      service:
        name: docker
        state: started
        enabled: yes

    - name: Add user to docker group
      user:
        name: "{{ ansible_user }}"
        groups: docker
        append: yes

    - name: Reset connection
      meta: reset_connection

    - name: Clone repo
      git:
        repo: "{{ repo_url }}"
        dest: "{{ app_dir }}"

    - name: Stop old containers
      command: docker-compose down
      args:
        chdir: "{{ app_dir }}"
      ignore_errors: yes

    - name: Build app (important fix)
      command: docker-compose build --no-cache
      args:
        chdir: "{{ app_dir }}"

    - name: Run app
      command: docker-compose up -d
      args:
        chdir: "{{ app_dir }}"

    - name: Show containers
      command: docker ps -a
