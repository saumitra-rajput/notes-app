apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: cadvisor
  namespace: monitoring
spec:
  selector:
    matchLabels:
      app: cadvisor
  template:
    metadata:
      labels:
        app: cadvisor
    spec:
      automountServiceAccountToken: false   # ✅ FIX (very important)

      containers:
        - name: cadvisor
          image: gcr.io/cadvisor/cadvisor:latest
          securityContext:
            privileged: true

          ports:
            - containerPort: 8080

          volumeMounts:
            - name: rootfs
              mountPath: /rootfs
              readOnly: true

            - name: var-run
              mountPath: /var/run
              readOnly: false   # ✅ FIX

            - name: sys
              mountPath: /sys
              readOnly: true

            - name: containerd   # ✅ FIX for kind
              mountPath: /var/lib/containerd
              readOnly: true

          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi

      volumes:
        - name: rootfs
          hostPath:
            path: /

        - name: var-run
          hostPath:
            path: /var/run

        - name: sys
          hostPath:
            path: /sys

        - name: containerd   # ✅ FIX
          hostPath:
            path: /var/lib/containerd

      tolerations:
        - key: node-role.kubernetes.io/control-plane
          effect: NoSchedule
---
apiVersion: v1
kind: Service
metadata:
  name: cadvisor-service
  namespace: monitoring
spec:
  selector:
    app: cadvisor
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
