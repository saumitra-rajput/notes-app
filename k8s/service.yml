kind: Service
apiVersion: v1
metadata:
  name: notes-app-service
  namespace: notes
spec:
  selector:
    app: notes-app
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
  type: ClusterIP

---

kind: Service
apiVersion: v1
metadata:
  name: mysql-service
  namespace: notes
spec:
  selector:
    app: mysql 
  ports:
    - port: 3306
