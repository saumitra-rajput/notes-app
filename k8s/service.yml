kind: Service
apiVersion: v1
metadata:
  name: notes-app-service
  namespace: notes
spec:
  selector:
    app: notes-app
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
  type: ClusterIP

---

kind: Service
apiVersion: v1
metadata:
  name: mysql-service
  namespace: notes
spec:
  selector:
    app: mysql 
  ports:
    - port: 3306

---

apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: notes
spec:
  type: NodePort
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
      nodePort: 30090

---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: notes
spec:
  type: NodePort
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30300
